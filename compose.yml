name: go-web-server

services:
  app:
    container_name: go-web-server-app
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    working_dir: /app
    command: air
    ports:
      - "8000:8000"
    networks:
      - go_network

  db:
    container_name: go-web-server-db
    image: postgres:18-trixie
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    networks:
      - go_network

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    networks:
      - go_network

networks:
  go_network:
    driver: bridge